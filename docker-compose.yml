services:
  note:
    build: .
    container_name: rag-note
    ports:
      - "8080:8080"
    volumes:
      - note_data:/app/data
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-dashscope}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-qwen-plus}
      - OPENAI_EMBED_MODEL=${OPENAI_EMBED_MODEL:-text-embedding-v3}
      # Ollama 配置（LLM_PROVIDER=ollama 时使用）
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_GEN_MODEL=${OLLAMA_GEN_MODEL:-qwen2.5:7b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    restart: unless-stopped

volumes:
  note_data:
